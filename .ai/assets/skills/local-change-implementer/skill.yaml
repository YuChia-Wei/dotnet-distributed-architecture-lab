asset_id: "local-change-implementer"
schema_version: "1.0"
asset_type: "skill-spec"
title: "Local Change Implementer"
purpose: "Execute one local class, object, method, symbol, SQL/ORM, or direct-call-site technical change without introducing new architecture boundaries or broadening into a slice."
portability: "repo-portable"
audience: "agent-facing"
source_of_truth: "canonical"
capability_slots:
  - "local-change"
triggers:
  - "local change"
  - "local-change-implementer"
  - "small code fix"
  - "extract method"
  - "rename symbol"
inputs:
  - "single target class, object, method, symbol, or local query"
  - "one bounded local change operation"
  - "allowed dependency radius"
outputs:
  - "local change result"
  - "dependency radius touched"
  - "behavior compatibility notes"
  - "handoff if a larger slice or architecture decision is required"
constraints:
  - "Do not introduce a new class or interface"
  - "Do not expand into architecture redesign or stage planning"
  - "Do not change domain language, DTO/API/event names, dependency direction, or module boundaries"
  - "Stop and hand off when the change no longer fits local scope"
workflow:
  - step: 1
    description: "Confirm the main target, local operation, and dependency radius"
  - step: 2
    description: "Apply one coherent local change"
  - step: 3
    description: "Update direct usage sites and validate the narrowest meaningful scope"
references:
  - ".ai/assets/skills/local-change-implementer/references/allowed-operations.md"
  - ".ai/assets/skills/local-change-implementer/references/execution-rules.md"
  - ".ai/assets/skills/local-change-implementer/references/skill-boundaries.md"
examples:
  - ".dev/guides/ai-collaboration-guides/LOCAL-CHANGE-IMPLEMENTER-SKILL-GUIDE.md"
human_guide: ".dev/guides/ai-collaboration-guides/LOCAL-CHANGE-IMPLEMENTER-SKILL-GUIDE.md"
wrapper_targets:
  - "claude"
  - "codex"
wrapper_metadata:
  claude:
    wrapper_path: ".claude/skills/local-change-implementer/"
  codex:
    wrapper_path: ".agents/skills/local-change-implementer/"
status: "active"
