asset_id: "code-reviewer"
schema_version: "1.0"
asset_type: "skill-spec"
title: "Code Reviewer"
purpose: "Review .NET code in this repository for DDD, Clean Architecture, CQRS, and Event Sourcing compliance. This skill reviews, scores, and marks issues; it does not plan refactors or define target architecture."
portability: "repo-portable"
audience: "agent-facing"
source_of_truth: "canonical"
capability_slots:
  - "review"
triggers:
  - "code review"
  - "review code"
  - "check this file"
inputs:
  - "target file or reviewed scope"
  - "repo standards and checklist rules"
outputs:
  - "transient conversational review or standalone durable assessment"
  - "architecture-level findings"
  - "code-level findings"
  - "review scores"
constraints:
  - "Do not define target architecture"
  - "Do not output a staged refactoring plan"
  - "Preserve software engineering reasoning even when analyzer or test output is available"
  - "Treat .ai/scripts C# grep checks as transitional aids, not final semantic validation"
  - "Keep review read-only; route remediation to dev-workflow or the appropriate implementer"
  - "Pin durable assessments to the reviewed Git revision and use ASM-YYYYMMDD-NNN#CR-NNN finding references"
workflow:
  - step: 1
    description: "Read the review index and checklist"
  - step: 2
    description: "Classify the reviewed scope and build a checklist comparison"
  - step: 3
    description: "Separate architecture-level and code-level findings"
  - step: 4
    description: "Return transient findings in conversation or persist an explicitly requested large review as a standalone assessment"
references:
  - ".ai/assets/tech-stacks/dotnet-backend/references/CODE-REVIEW-INDEX.MD"
  - ".ai/assets/skills/code-reviewer/references/checklist-reference.md"
  - ".ai/assets/skills/code-reviewer/references/output-contract.md"
  - ".dev/standards/CODE-REVIEW-CHECKLIST.md"
  - ".dev/standards/ASSESSMENT-ARTIFACT-POLICY.md"
templates:
  - ".ai/assets/skills/code-reviewer/templates/code-review-assessment-report-template.md"
examples:
  - ".dev/guides/ai-collaboration-guides/AI-REFACTORING-SKILL-BOUNDARY-GUIDE.md"
human_guide: ".dev/guides/ai-collaboration-guides/AI-REFACTORING-SKILL-BOUNDARY-GUIDE.md"
wrapper_targets:
  - "claude"
  - "codex"
wrapper_metadata:
  claude:
    wrapper_path: ".claude/skills/code-reviewer/"
  codex:
    wrapper_path: ".agents/skills/code-reviewer/"
status: "active"
