asset_id: "query-use-case-implementer"
asset_type: "skill-spec"
title: "Query Use Case Implementer"
purpose: "Implement a bounded query-side use case in this repository from requirement, spec, architecture decisions, or review findings without drifting into architecture redesign."
triggers:
  - "query use case"
  - "implement query"
  - "add query handler"
  - "query-use-case-implementer"
inputs:
  - "requirement, spec, or review findings for the query behavior"
  - "target DTO, projection, or read-model expectations"
  - "bounded-context scope and client-facing filter expectations"
outputs:
  - "bounded query-side implementation"
  - "touched files and validation notes"
  - "explicit handoff if projection design, testing, or review work remains"
constraints:
  - "Queries must not modify domain state"
  - "Return DTOs rather than domain entities"
  - "Use read-side storage or projections instead of write-model repositories"
  - "Stop and hand off when the task really requires architecture redesign or stage planning"
workflow:
  - step: 1
    description: "Confirm the query goal, read model shape, DTO contract, and client-facing filters"
  - step: 2
    description: "Apply query-side storage, handler, DTO, and naming rules"
  - step: 3
    description: "Implement the bounded query change and return validation notes plus any required next-skill handoff"
references:
  - ".ai/assets/skills/query-use-case-implementer/references/implementation-playbook.md"
  - ".ai/assets/skills/query-use-case-implementer/references/handoff-rules.md"
  - ".ai/assets/sub-agent-role-prompts/query-sub-agent/sub-agent.yaml"
  - ".dev/standards/USECASE-COMMAND-HANDLER-RELATIONSHIP.MD"
examples:
  - ".dev/guides/ai-collaboration-guides/USE-CASE-IMPLEMENTER-SKILL-GUIDE.md"
human_guide: ".dev/guides/ai-collaboration-guides/USE-CASE-IMPLEMENTER-SKILL-GUIDE.md"
wrapper_targets:
  - "claude"
  - "codex"
wrapper_metadata:
  claude:
    wrapper_path: ".claude/skills/query-use-case-implementer/"
  codex:
    runtime_wrapper_path: ".agents/skills/query-use-case-implementer/"
