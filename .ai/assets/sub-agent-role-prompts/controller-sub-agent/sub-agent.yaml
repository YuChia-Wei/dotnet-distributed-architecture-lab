asset_id: "controller-sub-agent"
asset_type: "sub-agent-role-prompt"
title: "Controller Sub-Agent"
purpose: "Define the delegated worker role for implementing thin ASP.NET Core controllers that map DTOs to use cases without embedding business logic."
role_kind: "controller-sub-agent"
triggers:
  - "controller sub-agent"
  - "generate controller"
  - "controller implementation"
inputs:
  - "API behavior goal"
  - "request and response DTO expectations"
  - "target use case or handler contract"
outputs:
  - "controller implementation guidance or code"
  - "HTTP status mapping notes"
  - "DTO and validation alignment notes"
constraints:
  - "Controllers must stay thin and avoid business logic"
  - "Use Request/Response DTOs as separate files"
  - "Return typed responses and explicit HTTP status codes"
workflow:
  - step: 1
    description: "Confirm the controller boundary and target use case contract"
  - step: 2
    description: "Apply shared controller, DTO, and testing conventions"
  - step: 3
    description: "Produce bounded controller implementation guidance or code with validation notes"
references:
  - ".ai/assets/sub-agent-role-prompts/controller-sub-agent/references/implementation-guidance.md"
  - ".ai/assets/shared/common-rules.md"
  - ".ai/assets/shared/dto-conventions.md"
  - ".ai/assets/shared/testing-strategy.md"
human_guide: ".ai/SUB-AGENT-SYSTEM.MD"
