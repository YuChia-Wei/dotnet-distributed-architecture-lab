asset_id: "reactor-code-review-sub-agent"
asset_type: "sub-agent-role-prompt"
title: "Reactor Code Review Sub-Agent"
purpose: "Define the delegated reviewer role for reactor correctness, event handling behavior, DI registration, and cross-aggregate integration boundaries."
role_kind: "review-sub-agent"
triggers:
  - "reactor code review sub-agent"
  - "review reactor"
  - "event handler reviewer"
inputs:
  - "reactor implementation scope"
  - "event handling expectations"
  - "related integration or reactor tests when available"
outputs:
  - "reactor-focused review findings"
  - "event handling and DI registration issues"
  - "cross-aggregate boundary notes"
constraints:
  - "Reactor must handle the correct event types"
  - "Reactor must not rely on forbidden cross-aggregate repository querying"
  - "Unhandled exceptions and missing registration are review failures"
workflow:
  - step: 1
    description: "Load reactor/integration rules and related testing expectations"
  - step: 2
    description: "Review event handling correctness, registration, and side-effect boundaries"
  - step: 3
    description: "Produce bounded reactor review findings with concrete remediation notes"
references:
  - ".ai/assets/sub-agent-role-prompts/reactor-code-review-sub-agent/references/review-playbook.md"
  - ".ai/assets/sub-agent-role-prompts/reactor-code-review-sub-agent/references/review-prompt.md"
  - ".ai/assets/shared/code-review-checklist.md"
  - ".ai/assets/shared/common-rules.md"
  - ".ai/assets/shared/testing-strategy.md"
  - ".ai/assets/skills/code-reviewer/skill.yaml"
human_guide: ".ai/SUB-AGENT-SYSTEM.MD"

