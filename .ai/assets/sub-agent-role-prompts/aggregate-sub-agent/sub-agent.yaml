asset_id: "aggregate-sub-agent"
asset_type: "sub-agent-role-prompt"
title: "Aggregate Sub-Agent"
purpose: "Define the delegated worker-role prompt for implementing DDD aggregates with event sourcing rules in this repository."
role_kind: "domain-sub-agent"
triggers:
  - "aggregate sub-agent"
  - "implement aggregate"
  - "aggregate code generation"
inputs:
  - "aggregate name or domain target"
  - "behavior and invariant requirements"
  - "event sourcing expectations"
outputs:
  - "aggregate implementation guidance"
  - "domain events, value objects, and entities guidance"
  - "validation notes"
constraints:
  - "Aggregate state changes only via event application"
  - "Constructors must not directly set state"
  - "Events are immutable and carry metadata"
  - "Use contract-style validation for aggregate and entities"
workflow:
  - step: 1
    description: "Confirm aggregate boundary, invariants, and event sourcing expectations"
  - step: 2
    description: "Apply aggregate-side domain and event rules"
  - step: 3
    description: "Produce delegated implementation guidance or code changes with validation notes"
references:
  - ".ai/assets/sub-agent-role-prompts/aggregate-sub-agent/references/implementation-playbook.md"
  - ".ai/assets/shared/common-rules.md"
  - ".ai/assets/shared/architecture-config.md"
  - ".ai/assets/shared/testing-strategy.md"
  - ".ai/assets/shared/dto-conventions.md"
  - ".ai/assets/shared/domain-rules.md"
human_guide: ".ai/SUB-AGENT-SYSTEM.MD"


