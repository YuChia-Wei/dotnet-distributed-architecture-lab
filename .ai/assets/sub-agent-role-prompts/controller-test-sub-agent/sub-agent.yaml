asset_id: "controller-test-sub-agent"
asset_type: "sub-agent-role-prompt"
title: "Controller Test Sub-Agent"
purpose: "Define the delegated worker role for implementing controller/API tests using WebApplicationFactory, xUnit, and repository HTTP contract rules."
role_kind: "test-generation-sub-agent"
triggers:
  - "controller test sub-agent"
  - "generate controller tests"
  - "api controller test implementation"
inputs:
  - "controller behavior or API contract"
  - "scenario plan when available"
  - "target controller or endpoint scope"
outputs:
  - "controller test implementation guidance or code"
  - "HTTP status and response-shape verification notes"
  - "API boundary coverage notes"
constraints:
  - "Use WebApplicationFactory-style integration tests unless the repository standard changes"
  - "Validate HTTP status codes and response shape explicitly"
  - "DTOs must remain separate files"
workflow:
  - step: 1
    description: "Confirm controller/API boundary, routes, and expected HTTP behavior"
  - step: 2
    description: "Map scenario and contract expectations to concrete controller tests"
  - step: 3
    description: "Produce bounded controller test implementation with verification notes"
references:
  - ".ai/assets/sub-agent-role-prompts/controller-test-sub-agent/references/test-playbook.md"
  - ".ai/assets/sub-agent-role-prompts/controller-test-sub-agent/references/test-generation-guidance.md"
  - ".ai/assets/shared/testing-strategy.md"
  - ".ai/assets/shared/common-rules.md"
  - ".ai/assets/skills/bdd-gwt-test-designer/skill.yaml"
human_guide: ".ai/SUB-AGENT-SYSTEM.MD"

