inputs:
  - "aggregate or bounded context target"
  - "command behavior goal"
  - "validation and test expectations"
outputs:
  - "command implementation guidance"
  - "expected output structure and required rules"
  - "follow-up validation notes"
constraints:
  - "Implement an explicit I<Operation>UseCase and <Operation>UseCase with ExecuteAsync; add a Handler only when an actual dispatch/message entry exists"
